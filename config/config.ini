[iptv]
# ===== 基本设置 =====
# 必须开启更新，否则流程会跳过所有采集与生成步骤
open_update = True
# 关键修复：确保生成 .m3u 格式的播放列表文件
open_m3u_result = True

# ===== 源获取与聚合 =====
# 开启本地源、在线搜索和多源聚合
open_local = True
open_online_search = False
# 关闭某些可能会失败的特定酒店源模块，提高稳定性
open_hotel = False
open_hotel_foodie = False

# ===== 质量过滤 =====
# 开启测速与速度过滤，确保最终列表中的地址是可用的
open_speed_test = True
open_filter_speed = True
# 最低测速阈值（MB/s），低于此速度的地址将被过滤，可根据自己的网络情况调整
min_speed = 0.5
# 开启分辨率过滤，过滤掉低清源
open_filter_resolution = True
min_resolution = 480

# ===== EPG & 网络 =====
# 开启节目单匹配
open_epg = True
# 支持 IPv4 和 IPv6 测速
open_ipv4 = True
open_ipv6 = True
# 测速并发数与超时时间，可根据你的网络环境调整
speed_test_workers = 20
speed_test_timeout = 8
source_timeout = 10

# ===== 频道处理 =====
# 开启未匹配频道自动归类，避免部分频道丢失
open_unmatch_category = True
# 开启空结果频道分类，以便后续排查
open_empty_category = True
# 开启实时写入，工作流运行过程中即可看到部分结果
open_realtime_write = True
# 开启历史更新数据复用，提升稳定性
open_history = True

# ===== 文件路径 =====
# 使用相对路径指向项目根目录下的配置文件
source_file = ../config/demo.txt
final_file = ../output/result.txt
subscribe_url_file = ../config/subscribe.txt
local_file = ../config/local.txt
alias_file = ../config/alias.txt
blacklist_file = ../config/blacklist.txt
whitelist_file = ../config/whitelist.txt
epg_file = ../config/epg.txt

# ===== 辅助工具 =====
# 关闭推流和页面服务，节省 Actions 运行资源
push_url = false
open_service = false
# 服务端口（仅在需要本地调试时使用）
app_port = 5180
