[iptv]
# 基础设置
open_update = True
open_realtime_write = True
open_service = False
open_m3u_result = True

# 过滤与质量
open_speed_test = True
open_filter_speed = True
open_filter_resolution = False
min_speed = 0.5
min_resolution = 480

# 源设置
open_hotel = True
open_hotel_foodie = True
open_hotel_fofa = False
open_multicast = False
open_multicast_foodie = False
open_multicast_fofa = False
open_local = True
open_online_search = False

# 文件路径 (相对于 iptv-api 运行目录，即 ./iptv-api/)
# 注意：这里需要指向项目根目录下的 config/ 文件夹
source_file = ../config/demo.txt
final_file = ../output/result.txt
subscribe_url_file = ../config/subscribe.txt
local_file = ../config/local.txt
alias_file = ../config/alias.txt
blacklist_file = ../config/blacklist.txt
whitelist_file = ../config/whitelist.txt
epg_file = ../config/epg.txt

# EPG 设置
open_epg = True

# 网络与测速
open_ipv4 = True
open_ipv6 = True
speed_test_workers = 10
speed_test_timeout = 8
source_timeout = 10
open_driver = False

# 其他
open_empty_category = True
open_unmatch_category = True
open_history = True
app_port = 5180
