name: IPTV Speed Checker

on:
  schedule:
    # 每天北京时间 6:00 和 18:00 运行（UTC 时间 22:00 和 10:00）
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:          # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write          # 允许推送更新后的文件
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install ffmpeg (for ffprobe)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run IPTV speed checker
        run: python main.py
      
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update IPTV sources $(date '+%Y-%m-%d %H:%M:%S')"
          git push
