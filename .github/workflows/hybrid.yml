# 请用这段代码完全替换 .github/workflows/hybrid.yml
name: IPTV Builder (Collect & Aggregate)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  # 每日凌晨自动检查并修复潜在问题
  - cron: '0 2 * * *'

jobs:
  # 任务1: 采集直播源 (基于 zilong7728/Collect-IPTV)
  collect-sources:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 关键修复：显式安装所有必需的依赖，并升级 pip 和 aiohttp 到最新版本
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade aiohttp

      # 直接运行项目提供的采集脚本
      - name: Run Collector script
        run: |
          python .github/workflows/iptv.py

      - name: Upload raw sources
        uses: actions/upload-artifact@v4
        with:
          name: raw-sources
          path: |
            best_sorted.m3u
            best_sorted.m3u8

  # 任务2: 聚合与生成最终播放列表 (基于 Guovin/iptv-api)
  aggregate-generate:
    runs-on: ubuntu-latest
    needs: collect-sources
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键修复：获取上一步采集到的源文件
      - name: Download raw sources
        uses: actions/download-artifact@v4
        with:
          name: raw-sources

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 关键修复：确保只保留 iptv-api 的必需依赖，避免版本冲突
      - name: Install iptv-api dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install beautifulsoup4
          pip install lxml
          pip install flask

      - name: Clone iptv-api repository
        run: git clone https://github.com/Guovin/iptv-api.git iptv-api-temp

      - name: Prepare configuration
        run: |
          mkdir -p iptv-api-temp/config/
          cp config/demo.txt iptv-api-temp/config/demo.txt || true
          cp config/config.ini iptv-api-temp/config/config.ini || true
          cp config/subscribe.txt iptv-api-temp/config/subscribe.txt || true
          
          # 关键修复：动态生成订阅源列表，并确保使用可访问的 Raw 地址
          echo "# 自动生成的外部订阅源" > iptv-api-temp/config/subscribe.txt
          echo "# 从 Collect-IPTV 采集的源" >> iptv-api-temp/config/subscribe.txt
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/best_sorted.m3u" >> iptv-api-temp/config/subscribe.txt

      - name: Run iptv-api
        run: |
          cd iptv-api-temp
          python main.py

      - name: Copy results
        run: |
          mkdir -p output
          find iptv-api-temp -name "result.m3u" -exec cp {} output/ \;
          find iptv-api-temp -name "result.txt" -exec cp {} output/ \;

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ best_sorted.m3u best_sorted.m3u8
          git commit -m "Auto update IPTV list" || echo "No changes to commit"
          git push
