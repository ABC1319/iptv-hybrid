name: Hybrid IPTV Builder

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# 关键修复：在作业级别设置写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout own repository
        uses: actions/checkout@v4

      # ---------- 1. 克隆 Collect-IPTV ----------
      - name: Clone Collect-IPTV
        run: git clone https://github.com/zilong7728/Collect-IPTV.git collect-iptv

      # ---------- 2. 运行 Collect-IPTV 采集 ----------
      - name: Set up Python for Collect-IPTV
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies (Collect-IPTV)
        run: |
          cd collect-iptv
          pip install -r requirements.txt || echo "No requirements.txt"

      - name: Run Collect-IPTV
        run: |
          cd collect-iptv
          python iptv.py

      # ---------- 3. 准备 iptv-api 订阅源 ----------
      - name: Prepare subscribe.txt for iptv-api
        run: |
          # 确保 config 目录存在
          mkdir -p config
          # 检查并复制现有的 subscribe.txt 文件
          if [ -f config/subscribe.txt ]; then
            cp config/subscribe.txt config/subscribe.txt.bak
          else
            touch config/subscribe.txt.bak
          fi
          # 生成新的 subscribe.txt，将 Collect-IPTV 的输出放在首位
          echo "# 来自 Collect-IPTV 的 AI 优选源" > config/subscribe.txt
          echo "../collect-iptv/best_sorted.m3u" >> config/subscribe.txt
          # 追加其他原有订阅源
          if [ -s config/subscribe.txt.bak ]; then
            cat config/subscribe.txt.bak >> config/subscribe.txt
          fi

      # ---------- 4. 克隆 iptv-api ----------
      - name: Clone iptv-api
        run: git clone https://github.com/Guovin/iptv-api.git iptv-api

      # ---------- 5. 运行 iptv-api 聚合 ----------
      - name: Install dependencies (iptv-api)
        run: |
          cd iptv-api
          pip install -r requirements.txt

      # 关键修复：直接运行，程序会自动读取 config/config.ini
      - name: Run iptv-api
        run: |
          cd iptv-api
          python main.py

      # ---------- 6. 复制最终结果到 output/ ----------
      - name: Copy final outputs
        run: |
          mkdir -p output
          # 查找并复制所有可能的输出文件
          find iptv-api -name "*.m3u" -exec cp {} output/ \;
          find iptv-api -name "*.txt" -exec cp {} output/ \;

      # ---------- 7. 提交并推送结果 ----------
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ collect-iptv/best_sorted.m3u
          # 确保 config 目录下的关键文件被追踪
          git add config/demo.txt config/config.ini config/subscribe.txt
          git diff --staged --quiet || git commit -m "Auto update IPTV list [skip actions]"
          git push
